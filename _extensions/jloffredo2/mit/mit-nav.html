<script>
// Beamer-style numbering: title slide unnumbered, main slides n/N (N excludes
// appendix), appendix slides A-1, A-2, ... (appendixnumberbeamer equivalent).
// Appendix starts at the slide with id "appendix" or class "appendix".
// Implemented as a custom Reveal slideNumber function so it can't be
// overwritten by reveal's built-in numbering.
(function () {
  function setup() {
    var slides = Reveal.getSlides();
    var titleIdx = slides.findIndex(function (s) { return s.id === "title-slide"; });
    var appendixIdx = slides.findIndex(function (s) {
      return s.id === "appendix" || s.classList.contains("appendix");
    });

    // slides that don't count: the title slide, standout slides, and section
    // divider slides (matches beamer, where the title frame, standout frames,
    // and section pages are unnumbered)
    function isUncounted(s, i) {
      return i === titleIdx ||
        s.classList.contains("standout") ||
        s.querySelector(":scope > h1") !== null;
    }

    Reveal.configure({
      slideNumber: function (slide) {
        var idx = slides.indexOf(slide);
        if (idx === -1 || isUncounted(slide, idx)) return [""];
        var mainEnd = appendixIdx === -1 ? slides.length : appendixIdx;
        if (appendixIdx !== -1 && idx >= appendixIdx) {
          var a = 0;
          for (var i = appendixIdx; i <= idx; i++) {
            if (!isUncounted(slides[i], i)) a++;
          }
          return ["A-" + a];
        }
        var n = 0, total = 0;
        for (var j = 0; j < mainEnd; j++) {
          if (!isUncounted(slides[j], j)) {
            total++;
            if (j <= idx) n++;
          }
        }
        return [n + "/" + total];
      }
    });

    // standout slides (e.g. "Thank You!") get a full maroon background
    slides.forEach(function (s) {
      if (s.classList.contains("standout") && !s.hasAttribute("data-background-color")) {
        s.setAttribute("data-background-color", "#750014");
        Reveal.syncSlide(s);
      }
    });

    function toggleChrome() {
      var cur = Reveal.getCurrentSlide();
      var onTitle = titleIdx > -1 && cur === slides[titleIdx];
      document.body.classList.toggle("on-title-slide", onTitle);
      document.body.classList.toggle("on-standout-slide", cur.classList.contains("standout"));
    }

    Reveal.on("slidechanged", toggleChrome);
    toggleChrome();
  }

  function init() {
    if (typeof Reveal === "undefined" || !Reveal.isReady) {
      window.setTimeout(init, 50);
      return;
    }
    if (Reveal.isReady()) {
      setup();
    } else {
      Reveal.on("ready", setup);
    }
  }

  if (document.readyState === "complete") {
    init();
  } else {
    window.addEventListener("load", init);
  }
})();
</script>

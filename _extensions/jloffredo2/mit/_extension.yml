title: MIT Reveal.js Template
author: Joseph R. Loffredo
version: 1.0.0
quarto-required: ">=1.4"
contributes:
  formats:
    revealjs:
      theme: [default, mit.scss]
      slide-number: c/t
      footer: "Joseph R. Loffredo, MIT"
      include-in-header: fonts.html
      include-after-body: mit-nav.html
      width: 100%
      height: 100%
      margin: 0.04
      center: false
      html-math-method: mathjax
      link-external-newwindow: true
      transition: none
      background-transition: none
    beamer:
      pdf-engine: xelatex
      slide-level: 2
      aspectratio: 169
      theme: metropolis
      themeoptions:
        - progressbar=frametitle
        - block=fill
      include-in-header: beamer-header.tex
      filters:
        - mit-filters.lua
